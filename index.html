<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="game-root">
        <h1>Memory Match</h1>
        
        <div class="stats-bar">
            <span id="moves-stat">Moves: 0</span>
            <span id="pairs-stat">Pairs: 0/8</span>
            <span id="time-stat">Time: 0s</span>
        </div>
        <div class="high-score-bar">
            <span id="best-moves">Best Moves: --</span>
            <span id="best-time">Best Time: --</span>
        </div>

        <div id="card-grid"></div>

        <div class="controls">
            <button id="restart-btn">Restart Game</button>
            <button id="mute-btn">🔊 On</button>
        </div>

        <div id="win-screen" style="display: none;">
            <div class="trophy-emoji">🏆</div>
            <h2>You Won!</h2>
            <button id="play-again-btn">Play Again</button>
        </div>
        <div id="particles-container"></div>
    </div>
    <div id="stars-container"></div>
</body>
</html>
